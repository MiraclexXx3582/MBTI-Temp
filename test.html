<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MBTI Test</title>
    <link href="https://fonts.googleapis.com/css2?family=Judson:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/test.css">
</head>
<body>
    <div class="bg-decoration">
        <div class="bg-union"></div>
        <div class="bg-rect bg-rect-25"></div>
        <div class="bg-rect bg-rect-26"></div>
        <div class="bg-rect bg-rect-27"></div>
        <div class="bg-circle bg-circle-1"></div>
        <div class="bg-circle bg-circle-2"></div>
        <div class="bg-circle bg-circle-3"></div>
        <div class="bg-circle bg-circle-4"></div>
        <div class="bg-oval bg-oval-1"></div>
        <div class="bg-oval bg-oval-2"></div>
        <div class="bg-oval bg-oval-3"></div>
        <div class="bg-diamond bg-diamond-1"></div>
        <div class="bg-diamond bg-diamond-2"></div>
        <div class="fractal fractal-1"></div>
        <div class="fractal fractal-2"></div>
        <div class="fractal fractal-3"></div>
        <div class="fractal fractal-4"></div>
        <div class="fractal fractal-5"></div>
        <div class="fractal fractal-6"></div>
    </div>

    <div class="fg-decoration">
        <div class="fg-shape fg-shape-1"></div>
        <div class="fg-shape fg-shape-2"></div>
        <div class="fg-shape fg-shape-3"></div>
        <div class="fg-shape fg-shape-4"></div>
        <div class="fg-shape fg-shape-5"></div>
        <div class="fg-shape fg-shape-6"></div>
        <div class="fg-shape fg-shape-7"></div>
        <div class="fg-shape fg-shape-8"></div>
    </div>

    <div class="logo-container">
        <img src="images/Group 4.png" alt="Logo" class="logo-img">
    </div>

    <div class="test-page" id="testPage"></div>

    <div class="progress-bar" id="progressBar">
        <div class="progress-content">
            <div class="arrow-left" onclick="prevPage()"></div>
            <div class="page-numbers" id="pageNumbers"></div>
            <div class="arrow-right" onclick="nextPage()"></div>
        </div>
    </div>

    <script src="js/test.js"></script>
</body>
</html>
